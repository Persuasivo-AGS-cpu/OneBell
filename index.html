<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#1F3F3A">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>OneBell - Real Strength</title>
    <meta name="description" content="OneBell es un programa de fuerza dinámico de 12 semanas con kettlebell, diseñado para espacios cortos y resultados reales.">
    <meta property="og:title" content="OneBell - Real Strength">
    <meta property="og:description" content="Programa de fuerza dinámico de 12 semanas para transformar tu cuerpo usando una sola kettlebell.">
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="./assets/icon-192.png">
    <link rel="stylesheet" href="styles.css?v=55">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div id="app" class="app-container">
        <!-- Content Area -->
        <main id="main-content">
            <!-- Dynamic pages will be injected here by app.js -->
        </main>

        <!-- Bottom Navigation -->
        <nav id="bottom-nav" class="bottom-nav">
            <button class="nav-item active" data-tab="home">
                <i data-lucide="home"></i>
                <span>Inicio</span>
            </button>
            <button class="nav-item" data-tab="program">
                <i data-lucide="calendar"></i>
                <span>Programa</span>
            </button>
            <button class="nav-item" data-tab="exercises">
                <i data-lucide="dumbbell"></i>
                <span>Ejercicios</span>
            </button>
            <button class="nav-item" data-tab="progress">
                <i data-lucide="bar-chart-2"></i>
                <span>Progreso</span>
            </button>
        </nav>
    </div>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').then(registration => {
                    console.log('SW registered: ', registration);
                }).catch(registrationError => {
                    console.log('SW registration failed: ', registrationError);
                });
            });
        }
    </script>
    <script src="app.js?v=55" type="module"></script>
</body>
</html>
