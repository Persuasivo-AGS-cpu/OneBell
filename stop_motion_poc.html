<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stop Motion POC - Kettlebell Swing</title>
    <style>
        body {
            background-color: #0A0F0E;
            color: white;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .modal-vault {
            background: #111A18;
            border-radius: 24px;
            width: 100%;
            max-width: 400px;
            padding: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            border: 1px solid rgba(255,255,255,0.05);
        }

        .stop-motion-container {
            width: 100%;
            aspect-ratio: 4/3;
            background-color: black;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            margin-bottom: 24px;
        }

        /* The images will be stacked and we will animate their opacity */
        .frame {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            /* No transition creates the "stop motion" harsh cut effect */
        }

        /* 
           3 Frames total.
           Animation duration: 1.5s total (0.5s per frame)
        */
        .frame-1 { animation: play-frames 1.8s infinite; animation-delay: 0.0s; }
        .frame-2 { animation: play-frames 1.8s infinite; animation-delay: 0.6s; }
        .frame-3 { animation: play-frames 1.8s infinite; animation-delay: 1.2s; }

        @keyframes play-frames {
            0%, 33.33% { opacity: 1; }  /* Visible for 1/3 of the time */
            33.34%, 100% { opacity: 0; } /* Invisible the rest */
        }

        h1 {
            margin: 0 0 8px 0;
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        p {
            color: rgba(255,255,255,0.7);
            line-height: 1.5;
            margin: 0 0 20px 0;
        }

        .controls {
            display: flex;
            justify-content: space-between;
        }

        .btn {
            background: #ff453a;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
        }

    </style>
</head>
<body>

    <div class="modal-vault">
        
        <div class="stop-motion-container">
            <!-- Frame 1: Bottom of swing -->
            <img src="/Users/abrahamgarza/.gemini/antigravity/brain/c2ef3fca-917a-4517-941a-d0288b9cf9a3/kb_swing_bottom_1775806410855.png" class="frame frame-1" alt="Bottom">
            <!-- Frame 2: Mid swing (Original) -->
            <img src="./assets/kb_swing.png" class="frame frame-2" alt="Mid">
            <!-- Frame 3: Top of swing -->
            <img src="/Users/abrahamgarza/.gemini/antigravity/brain/c2ef3fca-917a-4517-941a-d0288b9cf9a3/kb_swing_top_1775806434160.png" class="frame frame-3" alt="Top">
        </div>

        <h1>Kettlebell Swing</h1>
        <p>
            Muestra del efecto de Fotogramas Clave (Stop Motion) generado en vivo mediante CSS, rotando 3 imágenes consistentes de Inteligencia Artificial para crear la ilusión de movimiento continuo de baja carga.
        </p>

        <button class="btn" onclick="window.close()">Entendido</button>

    </div>

</body>
</html>
